version: "3.8"

services:
  agentos-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${IMAGE_NAME:-agno-agentos}:${IMAGE_TAG:-latest}
    container_name: agentos-api
    command: >
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      --reload-dir agents --reload-dir app --reload-dir db
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # Hot-reload: monta il codice sorgente e mantiene persistente il DB SQLite sul tuo PC
      - .:/app
    env_file:
      - path: .env
        required: false
    environment:
      - RUNTIME_ENV=dev
      - AGNO_DEBUG=True
      - PYTHONPATH=/app
      - AGENTOS_URL=http://127.0.0.1:8000
      - PRINT_ENV_ON_LOAD=True
      # API keys
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    networks:
      - agentos
    extra_hosts:
      - "host.docker.internal:host-gateway"

    # --- ABILITAZIONE GPU NVIDIA ---
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

networks:
  agentos:
