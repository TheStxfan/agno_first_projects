services:
  agentos-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${IMAGE_NAME:-agno-agentos}:${IMAGE_TAG:-latest}
    container_name: agentos-api
    entrypoint: []
    command: >
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      --reload-dir agents --reload-dir app --reload-dir db
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - hf_cache:/hf_cache
    env_file:
      - path: .env
        required: false
    environment:
      - RUNTIME_ENV=dev
      - AGNO_DEBUG=True
      - PYTHONPATH=/app
      - AGENTOS_URL=http://127.0.0.1:8000
      - PRINT_ENV_ON_LOAD=True
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - HF_HOME=/hf_cache
      - HF_HUB_DISABLE_XET=1
    networks:
      - agentos
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # --- ABILITAZIONE GPU NVIDIA ---
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  pgvector:
    image: agnohq/pgvector:18
    container_name: pgvector
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-agentos_db}
    volumes:
      - ./postgres_data:/var/lib/postgresql
    networks:
      - agentos

  barista-twin:
    build:
      context: .
      dockerfile: Dockerfile.barista
    image: barista-twin:latest
    container_name: barista-twin
    volumes:
      - .:/app
      - hf_cache:/hf_cache
    environment:
      - HF_HOME=/hf_cache
      - HF_HUB_DISABLE_XET=1
    networks:
      - agentos
    # --- ABILITAZIONE GPU NVIDIA ---
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

networks:
  agentos:

volumes:
  hf_cache:
